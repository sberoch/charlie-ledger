name: app-prod
services:
  postgres:
    image: postgres:18-alpine
    container_name: app-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    # postgres:18+ stores data in a version-specific subdir and expects the
    # volume at /var/lib/postgresql (not .../data). See docker-library/postgres#37.
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot: applies Drizzle migrations, then exits. `api` waits for it to
  # complete successfully before starting. Path is dist/src/** — see Dockerfile.api.
  api-migrate:
    image: ${API_IMAGE:?set API_IMAGE}:${API_IMAGE_TAG:-latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    command: ["node", "dist/src/common/database/migrate.js"]

  api:
    image: ${API_IMAGE:?set API_IMAGE}:${API_IMAGE_TAG:-latest}
    container_name: app-prod-api
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set BETTER_AUTH_URL}
      WEB_ORIGIN: ${WEB_ORIGIN:?set WEB_ORIGIN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_BIND_IP:-127.0.0.1}:${API_PORT:-5000}:5000"
    healthcheck:
      test:
        ["CMD-SHELL", "wget --spider -q http://127.0.0.1:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Thin better-auth client. NEXT_PUBLIC_API_URL was baked at build time, so the
  # runtime container needs no auth secret — all auth lives in the api.
  web:
    image: ${WEB_IMAGE:?set WEB_IMAGE}:${WEB_IMAGE_TAG:-latest}
    container_name: app-prod-web
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_BIND_IP:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
